<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-label="Flag of Earth, designed by Oskar Pernefeldt">
  <title>Flag of Earth</title>
  <desc>The International Flag of Planet Earth, designed by Oskar Pernefeldt (2015). Licensed under CC BY 4.0. flagofearth.com — Universal rights for all humanity.</desc>
  <rect width="900" height="600" fill="#006DB6"/>
  <circle cx="450" cy="300" r="220" fill="#1a9fe0" stroke="white" stroke-width="4"/>
  <ellipse cx="350" cy="240" rx="70" ry="55" fill="#2ecc71" opacity="0.9" transform="rotate(-20,350,240)"/>
  <ellipse cx="390" cy="360" rx="45" ry="70" fill="#27ae60" opacity="0.9" transform="rotate(10,390,360)"/>
  <ellipse cx="470" cy="230" rx="35" ry="45" fill="#2ecc71" opacity="0.9"/>
  <ellipse cx="480" cy="320" rx="40" ry="80" fill="#27ae60" opacity="0.9" transform="rotate(5,480,320)"/>
  <ellipse cx="560" cy="220" rx="80" ry="50" fill="#2ecc71" opacity="0.9" transform="rotate(-10,560,220)"/>
  <ellipse cx="570" cy="350" rx="40" ry="28" fill="#2ecc71" opacity="0.9" transform="rotate(15,570,350)"/>
  <circle cx="450" cy="300" r="220" fill="none" stroke="white" stroke-width="2.5" opacity="0.4"/>
  <ellipse cx="450" cy="300" rx="220" ry="70" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <ellipse cx="450" cy="300" rx="220" ry="140" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <line x1="450" y1="80" x2="450" y2="520" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <line x1="230" y1="300" x2="670" y2="300" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <circle cx="380" cy="220" r="60" fill="white" opacity="0.08"/>
  <rect width="900" height="600" fill="none" stroke="white" stroke-width="6"/>
</svg>